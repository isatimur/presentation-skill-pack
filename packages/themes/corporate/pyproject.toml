[project]
name = "presentation-skill-pack-theme-corporate"
version = "0.1.0"
description = "Formal corporate presentation theme — crisp white, navy text, restrained blue accent."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Timur Isachenko" }]
keywords = ["presentation-skill-pack", "theme", "ai-agent", "slides"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/presentation_skill_pack_theme_corporate"]

[tool.hatch.build.targets.wheel.force-include]
"theme.json" = "presentation_skill_pack_theme_corporate/theme.json"
