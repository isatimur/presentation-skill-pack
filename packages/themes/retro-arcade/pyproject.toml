[project]
name = "presentation-skill-pack-theme-retro-arcade"
version = "0.1.0"
description = "Retro 80s arcade presentation theme — deep purple-black bg, magenta + cyan neon, pixel fonts."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Timur Isachenko" }]
keywords = ["presentation-skill-pack", "theme", "ai-agent", "slides"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/presentation_skill_pack_theme_retro_arcade"]

[tool.hatch.build.targets.wheel.force-include]
"theme.json" = "presentation_skill_pack_theme_retro_arcade/theme.json"
