[project]
name = "presentation-skill-pack-theme-luxury-minimalist"
version = "0.1.0"
description = "Luxury minimalist presentation theme — warm off-white canvas, charcoal text, hairline borders, no gradients."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Timur Isachenko" }]
keywords = ["presentation-skill-pack", "theme", "ai-agent", "slides"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/presentation_skill_pack_theme_luxury_minimalist"]

[tool.hatch.build.targets.wheel.force-include]
"theme.json" = "presentation_skill_pack_theme_luxury_minimalist/theme.json"
